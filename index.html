<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STEICOflex Paketrechner</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      width: 100%;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #2f2f2f;
      box-sizing: border-box;
    "
  >
    <div
      style="
        width: 100%;
        max-width: none;
        margin: 0;
        padding: 0;
        line-height: 1.5;
        box-sizing: border-box;
      "
    >
      <div
        style="
          background: #eef3ea;
          padding: 12px 16px;
          font-size: 20px;
          font-weight: bold;
          color: #3d4a38;
          border: 1px solid #d8e1d1;
          box-sizing: border-box;
          width: 100%;
        "
      >
        Paketrechner
      </div>

      <div
        style="
          border: 1px solid #d8e1d1;
          border-top: none;
          background: #fff;
          padding: 16px;
          box-sizing: border-box;
          width: 100%;
        "
      >
        <div style="margin-bottom: 16px; font-size: 14px; color: #666">
          Berechne schnell, wie viele Pakete STEICOflex 036 du für deine Fläche
          benötigst. Die Berechnung rundet automatisch auf volle Pakete auf.
        </div>

        <div
          style="
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            width: 100%;
            box-sizing: border-box;
          "
        >
          <div
            style="flex: 1 1 220px; min-width: 220px; box-sizing: border-box"
          >
            <label
              for="steico-dicke"
              style="
                display: block;
                font-size: 13px;
                color: #666;
                margin-bottom: 6px;
              "
              >Dicke wählen</label
            >
            <select
              id="steico-dicke"
              style="
                width: 100%;
                padding: 12px;
                border: 1px solid #d8e1d1;
                font-size: 15px;
                background: #fff;
                box-sizing: border-box;
              "
            >
              <option value="30|11.224">30 mm</option>
              <option value="40|7.015">40 mm</option>
              <option value="50|6.314">50 mm</option>
              <option value="60|5.612">60 mm</option>
              <option value="80|4.209">80 mm</option>
              <option value="100|2.806">100 mm</option>
              <option value="120|2.806">120 mm</option>
              <option value="140|2.806">140 mm</option>
              <option value="160|2.105">160 mm</option>
              <option value="180|2.105">180 mm</option>
              <option value="200|1.403">200 mm</option>
              <option value="220|1.403">220 mm</option>
              <option value="240|1.403">240 mm</option>
            </select>
          </div>

          <div
            style="flex: 1 1 220px; min-width: 220px; box-sizing: border-box"
          >
            <label
              for="steico-flaeche"
              style="
                display: block;
                font-size: 13px;
                color: #666;
                margin-bottom: 6px;
              "
              >Benötigte Fläche in m²</label
            >
            <input
              id="steico-flaeche"
              type="number"
              step="0.01"
              min="0"
              placeholder="z.B. 48"
              style="
                width: 100%;
                padding: 12px;
                border: 1px solid #d8e1d1;
                font-size: 15px;
                box-sizing: border-box;
              "
            />
          </div>

          <div style="flex: 0 0 auto; display: flex; align-items: end">
            <button
              id="steico-button"
              style="
                padding: 12px 18px;
                border: none;
                background: #008c56;
                color: #fff;
                font-size: 15px;
                font-weight: bold;
                cursor: pointer;
                border-radius: 4px;
              "
            >
              Berechnen
            </button>
          </div>
        </div>

        <div
          id="steico-result"
          style="
            background: #f7f9f5;
            border: 1px solid #d8e1d1;
            padding: 16px;
            font-size: 15px;
            color: #2f2f2f;
            width: 100%;
            box-sizing: border-box;
          "
        >
          Bitte Dicke auswählen und benötigte Fläche eingeben.
        </div>

        <div style="margin-top: 12px; font-size: 12px; color: #777">
          Hinweis: Die Berechnung dient zur Orientierung und rundet auf ganze
          Pakete auf.
        </div>
      </div>
    </div>

    <script>
      function formatGerman(value) {
        return value.toFixed(3).replace('.', ',');
      }

      function calculateSteicoPackages() {
        var select = document.getElementById('steico-dicke').value.split('|');
        var dicke = select[0];
        var qmProPaket = parseFloat(select[1]);
        var flaecheInput = document.getElementById('steico-flaeche').value;
        var flaeche = parseFloat(String(flaecheInput).replace(',', '.'));
        var result = document.getElementById('steico-result');

        if (!flaeche || flaeche <= 0) {
          result.innerHTML = 'Bitte eine gültige Fläche in m² eingeben.';
          return;
        }

        var pakete = Math.ceil(flaeche / qmProPaket);
        var gesamtQm = pakete * qmProPaket;
        var reserve = gesamtQm - flaeche;

        result.innerHTML =
          '<div style="font-size: 18px; font-weight: bold; color: #3d4a38; margin-bottom: 10px;">Ergebnis</div>' +
          '<div style="display: flex; flex-wrap: wrap; gap: 12px;">' +
          '<div style="flex: 1 1 180px; background: #fff; border: 1px solid #d8e1d1; padding: 12px; box-sizing: border-box;">' +
          '<div style="font-size: 12px; color: #666; margin-bottom: 4px;">Gewählte Dicke</div>' +
          '<div style="font-size: 18px; font-weight: bold;">' +
          dicke +
          ' mm</div>' +
          '</div>' +
          '<div style="flex: 1 1 180px; background: #fff; border: 1px solid #d8e1d1; padding: 12px; box-sizing: border-box;">' +
          '<div style="font-size: 12px; color: #666; margin-bottom: 4px;">Benötigte Pakete</div>' +
          '<div style="font-size: 18px; font-weight: bold;">' +
          pakete +
          '</div>' +
          '</div>' +
          '<div style="flex: 1 1 180px; background: #fff; border: 1px solid #d8e1d1; padding: 12px; box-sizing: border-box;">' +
          '<div style="font-size: 12px; color: #666; margin-bottom: 4px;">Abgedeckte Fläche</div>' +
          '<div style="font-size: 18px; font-weight: bold;">' +
          formatGerman(gesamtQm) +
          ' m²</div>' +
          '</div>' +
          '<div style="flex: 1 1 180px; background: #fff; border: 1px solid #d8e1d1; padding: 12px; box-sizing: border-box;">' +
          '<div style="font-size: 12px; color: #666; margin-bottom: 4px;">Reserve</div>' +
          '<div style="font-size: 18px; font-weight: bold;">' +
          formatGerman(reserve) +
          ' m²</div>' +
          '</div>' +
          '</div>';
      }

      document
        .getElementById('steico-button')
        .addEventListener('click', calculateSteicoPackages);

      document
        .getElementById('steico-flaeche')
        .addEventListener('keydown', function (event) {
          if (event.key === 'Enter') {
            calculateSteicoPackages();
          }
        });
    </script>
  </body>
</html>
